name: CI/CD

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      matrix:
        node-version: [20, 22, 24]
    
    steps:
      - name: Checkout pull request
        if: github.event_name == 'pull_request'
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags --prune --depth=1 origin \
            "+refs/pull/${{ github.event.pull_request.number }}/merge:refs/remotes/pull/${{ github.event.pull_request.number }}/merge"
          git checkout --progress --force "refs/remotes/pull/${{ github.event.pull_request.number }}/merge"

      - name: Checkout branch
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint code
        run: npm run lint
        
      - name: Type check
        run: npm run typecheck
        
      - name: Run tests with coverage
        if: matrix.node-version == '20'
        run: npm run test:coverage -- --run
        env:
          GOOGLE_API_KEY: dummy_key_for_tests

      - name: Run tests
        if: matrix.node-version != '20'
        run: npm run test -- --run
        env:
          GOOGLE_API_KEY: dummy_key_for_tests
        
      - name: Build project
        run: npm run build
        
      - name: Upload coverage reports
        if: matrix.node-version == '20' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v5

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        if: github.event_name == 'pull_request'
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags --prune --depth=1 origin \
            "+refs/pull/${{ github.event.pull_request.number }}/merge:refs/remotes/pull/${{ github.event.pull_request.number }}/merge"
          git checkout --progress --force "refs/remotes/pull/${{ github.event.pull_request.number }}/merge"

      - name: Checkout branch
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm audit --omit=dev --audit-level=high

  release:
    name: Release
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        
      - name: Release
        run: npx semantic-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    name: Build Docker Image
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
