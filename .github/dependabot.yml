version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Group MCP SDK updates together
      mcp-sdk:
        patterns:
          - "@modelcontextprotocol/*"
      # Group TypeScript tooling updates
      typescript:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
          - "tsx"
      # Group testing tools
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "nock"
          - "@types/supertest"
      # Group linting/formatting tools
      linting:
        patterns:
          - "eslint"
          - "prettier"
      # Group semantic-release tooling
      release:
        patterns:
          - "semantic-release"
          - "@semantic-release/*"
      # Group type definitions
      types:
        patterns:
          - "@types/*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "ci"
    commit-message:
      prefix: "chore(ci)"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "docker"
    commit-message:
      prefix: "chore(docker)"
